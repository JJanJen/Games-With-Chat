<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breakout - Janisis Juca</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
  color:white;
  font-family:'Press Start 2P';
}

canvas {
  background:black;
  border:4px solid white;
}
</style>
</head>

<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let lives = 3;
let gameOver = false;
let paused = false;

const paddle = {
  width:120,
  height:20,
  x:340,
  y:560,
  dx:0,
  speed:8
};

const ball = {
  x:400,
  y:300,
  dx:4,
  dy:-4,
  size:10
};

let powerUps = [];

const LEADERBOARD = "breakout_scores";

// ------------------ PADDLE ------------------
function drawPaddle() {
  ctx.fillStyle = "#00ffff";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function movePaddle() {
  paddle.x += paddle.dx;
  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.width > canvas.width)
    paddle.x = canvas.width - paddle.width;
}

// ------------------ BALL ------------------
function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI*2);
  ctx.fillStyle = "#ffff00";
  ctx.fill();
}

function moveBall() {
  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
  if (ball.y < 0) ball.dy *= -1;

  // paddle hit
  if (
    ball.y > paddle.y &&
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width
  ) {
    ball.dy *= -1;
  }

  // lose life
  if (ball.y > canvas.height) {
    lives--;
    resetBall();
    if (lives === 0) gameOver = true;
  }
}

function resetBall() {
  ball.x = 400;
  ball.y = 300;
  ball.dx = 4;
  ball.dy = -4;
}

// ------------------ POWER UPS ------------------
function spawnPowerUp(x,y) {
  if (Math.random() < 0.3) {
    const types = ["wide","slow","sticky"];
    const type = types[Math.floor(Math.random()*3)];
    powerUps.push({x,y,type});
  }
}

function drawPowerUps() {
  powerUps.forEach(p => {
    ctx.fillStyle = "red";
    ctx.fillRect(p.x, p.y, 20,20);
    p.y += 2;
  });
}

function checkPowerUpCatch() {
  powerUps.forEach((p,i) => {
    if (
      p.y > paddle.y &&
      p.x > paddle.x &&
      p.x < paddle.x + paddle.width
    ) {
      applyPowerUp(p.type);
      powerUps.splice(i,1);
    }
  });
}

function applyPowerUp(type) {
  if (type === "wide") paddle.width += 40;
  if (type === "slow") {
    ball.dx *= 0.5;
    ball.dy *= 0.5;
  }
  if (type === "sticky") {
    ball.dx = 0;
    ball.dy = 0;
    setTimeout(()=>{ ball.dx = 4; ball.dy = -4; }, 2000);
  }
}

// ------------------ BRICKS ------------------
let bricks = [];

function createBricks() {
  for (let i=0;i<5;i++) {
    for (let j=0;j<8;j++) {
      bricks.push({x: j*90+50, y: i*40+50});
    }
  }
}

function drawBricks() {
  bricks.forEach(b => {
    ctx.fillStyle="green";
    ctx.fillRect(b.x,b.y,70,20);
  });
}

function checkBrickCollision() {
  bricks.forEach((b,i) => {
    if (
      ball.x > b.x &&
      ball.x < b.x+70 &&
      ball.y > b.y &&
      ball.y < b.y+20
    ) {
      bricks.splice(i,1);
      ball.dy *= -1;
      score += 100;
      spawnPowerUp(b.x,b.y);
    }
  });
}

// ------------------ LEADERBOARD ------------------
function saveScore() {
  let scores = JSON.parse(localStorage.getItem(LEADERBOARD)) || [];
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,5);
  localStorage.setItem(LEADERBOARD, JSON.stringify(scores));
}

function drawLeaderboard() {
  let scores = JSON.parse(localStorage.getItem(LEADERBOARD)) || [];
  ctx.fillText("TOP SCORES", 250, 300);
  scores.forEach((s,i)=>{
    ctx.fillText((i+1)+". "+s, 250, 340 + i*30);
  });
}

// ------------------ DRAW ------------------
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (gameOver) {
    saveScore();
    ctx.fillText("GAME OVER", 250,200);
    drawLeaderboard();
    return;
  }

  if (paused) {
    ctx.fillText("PAUSED", 300, 300);
    return;
  }

  drawPaddle();
  drawBall();
  drawBricks();
  drawPowerUps();

  movePaddle();
  moveBall();
  checkBrickCollision();
  checkPowerUpCatch();

  ctx.fillText("Score: "+score, 20,20);
  ctx.fillText("Lives: "+lives, 20,40);
}

// ------------------ LOOP ------------------
function loop() {
  draw();
  requestAnimationFrame(loop);
}

// ------------------ CONTROLS ------------------
document.addEventListener("keydown", e=>{
  if (e.key === "ArrowRight") paddle.dx = paddle.speed;
  if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
  if (e.key === "p") paused = !paused;
});

document.addEventListener("keyup", e=>{
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
});

// start
createBricks();
loop();
</script>
</body>
</html>
