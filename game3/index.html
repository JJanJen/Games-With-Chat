<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Labyrinth Escape - Janisis Juca</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
  color: white;
  font-family: 'VT323', monospace;
}

canvas {
  border: 4px solid white;
  background: black;
  box-shadow: 0 0 20px white;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const SIZE = 25;
const WIDTH = 21;
const HEIGHT = 21;

canvas.width = WIDTH * SIZE;
canvas.height = HEIGHT * SIZE;

let maze = [];
let player = { x: 1, y: 1 };
let exit = { x: WIDTH - 2, y: HEIGHT - 2 };
let coins = [];
let guards = [];
let powerUps = [];
let timeLeft = 120;
let gameState = "start";

let lastTimerUpdate = 0;
let lastGuardMove = 0;

function generateMaze(w, h) {
  let newMaze = Array(h).fill(null).map(() => Array(w).fill(1));

  function carve(x, y) {
    const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);

    for (const [dx, dy] of dirs) {
      const nx = x + dx;
      const ny = y + dy;

      if (ny > 0 && ny < h - 1 && nx > 0 && nx < w - 1 && newMaze[ny][nx] === 1) {
        newMaze[ny][nx] = 0;
        newMaze[y + dy / 2][x + dx / 2] = 0;
        carve(nx, ny);
      }
    }
  }

  newMaze[1][1] = 0;
  carve(1, 1);

  player = { x: 1, y: 1 };
  exit = { x: w - 2, y: h - 2 };

  return newMaze;
}

function spawnCoins() {
  coins = [];
  for (let y = 1; y < HEIGHT - 1; y++) {
    for (let x = 1; x < WIDTH - 1; x++) {
      if ((x !== 1 || y !== 1) && (x !== exit.x || y !== exit.y) && maze[y][x] === 0 && Math.random() < 0.09) {
        coins.push({ x, y });
      }
    }
  }

  if (coins.length < 5) {
    coins.push({ x: 3, y: 1 });
    coins.push({ x: 5, y: 3 });
    coins.push({ x: 7, y: 5 });
  }
}

function spawnGuards() {
  guards = [];

  const possibleHorizontal = [];
  const possibleVertical = [];

  for (let y = 2; y < HEIGHT - 2; y++) {
    for (let x = 2; x < WIDTH - 2; x++) {
      if (
        maze[y][x] === 0 &&
        maze[y][x - 1] === 0 &&
        maze[y][x + 1] === 0 &&
        maze[y][x - 2] === 0 &&
        maze[y][x + 2] === 0 &&
        !(Math.abs(x - 1) < 3 && Math.abs(y - 1) < 3) &&
        !(Math.abs(x - exit.x) < 3 && Math.abs(y - exit.y) < 3)
      ) {
        possibleHorizontal.push({ x, y, dir: 1, type: "h" });
      }

      if (
        maze[y][x] === 0 &&
        maze[y - 1][x] === 0 &&
        maze[y + 1][x] === 0 &&
        maze[y - 2][x] === 0 &&
        maze[y + 2][x] === 0 &&
        !(Math.abs(x - 1) < 3 && Math.abs(y - 1) < 3) &&
        !(Math.abs(x - exit.x) < 3 && Math.abs(y - exit.y) < 3)
      ) {
        possibleVertical.push({ x, y, dir: 1, type: "v" });
      }
    }
  }

  if (false) {
    const hGuard = possibleHorizontal[Math.floor(Math.random() * possibleHorizontal.length)];
    guards.push(hGuard);
  }

  if (possibleVertical.length > 0 && Math.random() < 0.5) {
    const vGuard = possibleVertical[Math.floor(Math.random() * possibleVertical.length)];
    guards.push(vGuard);
  }
}

function spawnPowerUps() {
  powerUps = [];
  for (let y = 1; y < HEIGHT - 1; y++) {
    for (let x = 1; x < WIDTH - 1; x++) {
      if (
        maze[y][x] === 0 &&
        Math.random() < 0.025 &&
        (x !== 1 || y !== 1) &&
        (x !== exit.x || y !== exit.y)
      ) {
        powerUps.push({ x, y });
      }
    }
  }
}

function drawMaze() {
  for (let y = 0; y < HEIGHT; y++) {
    for (let x = 0; x < WIDTH; x++) {
      ctx.fillStyle = maze[y][x] === 1 ? "#0033cc" : "#111";
      ctx.fillRect(x * SIZE, y * SIZE, SIZE, SIZE);
    }
  }
}

function drawCoins() {
  ctx.fillStyle = "gold";
  coins.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x * SIZE + SIZE / 2, c.y * SIZE + SIZE / 2, 6, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGuards() {
  guards.forEach(g => {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(
      g.x * SIZE + SIZE / 2,
      g.y * SIZE + SIZE / 2,
      SIZE / 2 - 4,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function drawPowerUps() {
  ctx.fillStyle = "lime";
  powerUps.forEach(p => {
    ctx.fillRect(p.x * SIZE + 5, p.y * SIZE + 5, 15, 15);
  });
}

function drawPlayer() {
  ctx.fillStyle = "white";
  ctx.fillRect(player.x * SIZE, player.y * SIZE, SIZE, SIZE);
}

function drawExit() {
  ctx.fillStyle = coins.length === 0 ? "lime" : "gray";
  ctx.fillRect(exit.x * SIZE, exit.y * SIZE, SIZE, SIZE);
}

function drawUI() {
  ctx.fillStyle = "white";
  ctx.font = "24px VT323";
  ctx.textAlign = "left";
  ctx.fillText(`Time: ${timeLeft}`, 10, 24);
  ctx.fillText(`Coins Left: ${coins.length}`, 10, 48);
  ctx.fillText("Janisis Juca", 10, 72);
}

function drawCenterScreen(title, subtitle) {
  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "48px VT323";
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);

  ctx.font = "28px VT323";
  ctx.fillText(subtitle, canvas.width / 2, canvas.height / 2 + 30);
}

function moveGuards() {
  guards.forEach(g => {
    if (g.type === "h") {
      const nextX = g.x + g.dir;

      if (
        maze[g.y][nextX] === 1 ||
        maze[g.y][nextX - 1] === 1 ||
        maze[g.y][nextX + 1] === 1
      ) {
        g.dir *= -1;
      } else {
        g.x = nextX;
      }
    } else {
      const nextY = g.y + g.dir;

      if (
        maze[nextY][g.x] === 1 ||
        maze[nextY - 1][g.x] === 1 ||
        maze[nextY + 1][g.x] === 1
      ) {
        g.dir *= -1;
      } else {
        g.y = nextY;
      }
    }
  });
}

function checkGuardCollision() {
  guards.forEach(g => {
    if (g.x === player.x && g.y === player.y) {
      player.x = 1;
      player.y = 1;
    }
  });
}

function collectCoins() {
  coins = coins.filter(c => !(c.x === player.x && c.y === player.y));
}

function collectPowerUps() {
  powerUps = powerUps.filter(p => {
    if (p.x === player.x && p.y === player.y) {
      timeLeft += 30;
      return false;
    }
    return true;
  });
}

function movePlayer(dx, dy) {
  if (gameState !== "play") return;

  const nx = player.x + dx;
  const ny = player.y + dy;

  if (maze[ny][nx] === 0 || (nx === exit.x && ny === exit.y)) {
    player.x = nx;
    player.y = ny;
  }

  collectCoins();
  collectPowerUps();
  checkGuardCollision();

  if (player.x === exit.x && player.y === exit.y && coins.length === 0) {
    gameState = "win";
  }
}

function startGame() {
  maze = generateMaze(WIDTH, HEIGHT);
  spawnCoins();
  spawnGuards();
  spawnPowerUps();
  timeLeft = 120;
  gameState = "play";
  lastTimerUpdate = performance.now();
  lastGuardMove = performance.now();
}

function gameLoop(timestamp) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === "start") {
    drawCenterScreen("LABYRINTH ESCAPE", "Click to Start");
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === "win") {
    drawCenterScreen("YOU WIN!", "Click to Play Again");
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === "lose") {
    drawCenterScreen("TIME'S UP!", "Click to Try Again");
    requestAnimationFrame(gameLoop);
    return;
  }

  if (timestamp - lastTimerUpdate >= 1000) {
    timeLeft--;
    lastTimerUpdate = timestamp;

    if (timeLeft <= 0) {
      gameState = "lose";
    }
  }

  if (timestamp - lastGuardMove >= 350) {
    moveGuards();
    checkGuardCollision();
    lastGuardMove = timestamp;
  }

  drawMaze();
  drawExit();
  drawCoins();
  drawGuards();
  drawPowerUps();
  drawPlayer();
  drawUI();

  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") movePlayer(0, -1);
  if (e.key === "ArrowDown") movePlayer(0, 1);
  if (e.key === "ArrowLeft") movePlayer(-1, 0);
  if (e.key === "ArrowRight") movePlayer(1, 0);
});

canvas.addEventListener("click", () => {
  if (gameState === "start" || gameState === "win" || gameState === "lose") {
    startGame();
  }
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
